name: Build Android APK

# Builds the USM2 debug APK. The copyrighted DB + artwork are NOT in this public
# repo: they live in the private Matswm86/USM2-assets repo, checked out read-only
# via the ASSETS_DEPLOY_KEY deploy key and bundled by tools/stage_assets.py. The
# APK ships the original art, so it is a PRIVATE workflow artifact only — there is
# deliberately no public release step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  APK_NAME: usm2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (public)
        uses: actions/checkout@v4

      - name: Checkout assets (private, read-only)
        uses: actions/checkout@v4
        with:
          repository: Matswm86/USM2-assets
          ssh-key: ${{ secrets.ASSETS_DEPLOY_KEY }}
          path: assets-src

      - name: Stage decoded assets into the app
        run: |
          set -e
          cp -r assets-src/decoded ./decoded
          python3 tools/stage_assets.py
          echo "Bundled assets:"
          ls -la android/app/src/main/assets/data android/app/src/main/assets/img | head -20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore (or generate) debug keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -e
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Using stable keystore from ANDROID_DEBUG_KEYSTORE_BASE64 secret"
            echo -n "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
          else
            echo "Secret not set — generating ephemeral keystore (signature changes per build)"
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storetype PKCS12
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          set -e
          cp android/app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}.apk"
          ls -la "${APK_NAME}.apk"

      - name: Upload APK as private workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-apk
          path: ${{ env.APK_NAME }}.apk
          retention-days: 30
